<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { background: #121212; color: #fff; font-family: 'Courier New', monospace; padding: 15px; margin: 0; user-select: none; }
    .machine { background: #1e1e24; padding: 15px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #333; max-width: 450px; margin: 0 auto; }
    
    .header-panel { background: #0a0a0c; padding: 12px; border-radius: 8px; border: 1px solid #ff0055; margin-bottom: 20px; text-align: center; box-shadow: inset 0 0 10px rgba(255,0,85,0.2); }
    h2 { margin: 0 0 5px 0; color: #00ffcc; text-transform: uppercase; font-size: 18px; letter-spacing: 2px;}
    .display { color: #ff0055; font-size: 14px; text-transform: uppercase; font-weight: bold; }
    
    .track { margin-bottom: 12px; }
    .row-label { font-size: 10px; color: #aaa; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
    .grid { display: grid; grid-template-columns: repeat(16, 1fr); gap: 3px; }
    
    .pad { aspect-ratio: 1; background: #333; border-radius: 3px; cursor: pointer; transition: background 0.1s; border: 1px solid #111; box-shadow: inset 0 2px 4px rgba(255,255,255,0.1); }
    /* Alternate colors for the grid beats (1, 5, 9, 13) to make programming easier */
    .pad:nth-child(4n+1) { background: #3a3a3a; } 
    
    .pad.active { background: #00ffcc; box-shadow: 0 0 8px #00ffcc; border-color: #fff; }
    .pad.playing { filter: brightness(1.8); transform: scale(1.05); background: #fff; box-shadow: 0 0 12px #fff; }
    
    .controls { margin-top: 25px; display: flex; justify-content: space-between; align-items: center; background: #0a0a0c; padding: 15px; border-radius: 8px; border: 1px solid #333; }
    .btn { background: #00ffcc; color: #000; border: none; padding: 12px 30px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 0 #00b38f; transition: transform 0.1s, box-shadow 0.1s;}
    .btn:active { transform: translateY(4px); box-shadow: 0 0 0 #00b38f; }
    .btn.stop { background: #ff0055; box-shadow: 0 4px 0 #b3003b; color: white;}
    
    .slider-container { display: flex; flex-direction: column; align-items: center; width: 50%; }
    .slider-label { font-size: 10px; color: #888; margin-bottom: 5px; }
    input[type=range] { width: 100%; accent-color: #00ffcc; }
  </style>
</head>
<body>

  <div class="machine">
    <div class="header-panel">
      <h2>Pro Sequencer</h2>
      <div class="display" id="screen">BPM: 120 | GENRE: INIT</div>
    </div>
    
    <div id="tracks-container"></div>
    
    <div class="controls">
      <button class="btn" id="playBtn" onclick="togglePlay()">Play</button>
      <div class="slider-container">
        <span class="slider-label">TEMPO (BPM)</span>
        <input type="range" id="bpmSlider" min="60" max="180" value="120" oninput="updateBPM(this.value)">
      </div>
    </div>
  </div>

  <script>
    // State
    let isPlaying = false;
    let currentStep = 0;
    let bpm = 120;
    let timerID;
    let audioCtx;
    let noiseBuffer;
    
    // Order of tracks from top to bottom
    const instruments = ['closed_hat', 'open_hat', 'clap', 'snare', 'tom', 'kick'];
    const trackNames = {'closed_hat': 'Closed Hat', 'open_hat': 'Open Hat', 'clap': 'Clap', 'snare': 'Snare', 'tom': 'Tom', 'kick': 'Kick'};
    
    let pattern = {};
    instruments.forEach(inst => pattern[inst] = new Array(16).fill(0));

    // --- AUDIO ENGINE ---
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        // Pre-generate noise buffer
        const bufferSize = audioCtx.sampleRate * 2; // 2 seconds of noise
        noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function createOsc(time, duration, type = 'sine') {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(time); osc.stop(time + duration);
      return { osc, gain };
    }

    function playKick(time) {
      const { osc, gain } = createOsc(time, 0.5);
      osc.frequency.setValueAtTime(150, time);
      osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.5);
      gain.gain.setValueAtTime(1, time);
      gain.gain.exponentialRampToValueAtTime(0.01, time + 0.5);
    }

    function playTom(time) {
      const { osc, gain } = createOsc(time, 0.3);
      osc.frequency.setValueAtTime(200, time); // Higher than kick
      osc.frequency.exponentialRampToValueAtTime(50, time + 0.3);
      gain.gain.setValueAtTime(0.8, time);
      gain.gain.exponentialRampToValueAtTime(0.01, time + 0.3);
    }

    function playSnare(time) {
      const { osc, gain } = createOsc(time, 0.2, 'triangle');
      osc.frequency.setValueAtTime(250, time);
      gain.gain.setValueAtTime(0.8, time);
      gain.gain.exponentialRampToValueAtTime(0.01, time + 0.2);
      playNoise(time, 0.2, 2000, 'highpass');
    }

    function playClap(time) {
      // Claps are actually multiple quick noise bursts
      playNoise(time, 0.15, 1000, 'bandpass', 0.8);
      playNoise(time + 0.01, 0.15, 1000, 'bandpass', 0.8);
      playNoise(time + 0.02, 0.2, 1000, 'bandpass', 1);
    }

    function playClosedHat(time) {
      playNoise(time, 0.05, 7000, 'highpass', 0.5);
    }

    function playOpenHat(time) {
      playNoise(time, 0.3, 7000, 'highpass', 0.5); // Longer decay
    }

    // Generic Noise Generator for Hats, Snares, Claps
    function playNoise(time, duration, filterFreq, filterType, vol=0.6) {
      const noise = audioCtx.createBufferSource();
      noise.buffer = noiseBuffer;
      // Start at a random offset to keep it sounding "random"
      const offset = Math.random() * Math.max(0, noiseBuffer.duration - duration);

      const filter = audioCtx.createBiquadFilter();
      filter.type = filterType; filter.frequency.value = filterFreq;
      
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(vol, time);
      gain.gain.exponentialRampToValueAtTime(0.01, time + duration);
      
      noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
      noise.start(time, offset, duration);
    }

    // --- UI BUILDER ---
    const container = document.getElementById('tracks-container');
    instruments.forEach(inst => {
      const trackDiv = document.createElement('div');
      trackDiv.className = 'track';
      
      const label = document.createElement('div');
      label.className = 'row-label';
      label.innerText = trackNames[inst];
      trackDiv.appendChild(label);
      
      const grid = document.createElement('div');
      grid.className = 'grid';
      grid.id = `grid-${inst}`;
      
      for (let i = 0; i < 16; i++) {
        const pad = document.createElement('div');
        pad.className = 'pad';
        pad.id = `pad-${inst}-${i}`;
        pad.onclick = () => {
          pattern[inst][i] = pattern[inst][i] ? 0 : 1;
          pad.classList.toggle('active');
        };
        grid.appendChild(pad);
      }
      trackDiv.appendChild(grid);
      container.appendChild(trackDiv);
    });

    function updateGridVisuals() {
      instruments.forEach(inst => {
        for (let i = 0; i < 16; i++) {
          const pad = document.getElementById(`pad-${inst}-${i}`);
          if (pattern[inst][i]) pad.classList.add('active');
          else pad.classList.remove('active');
        }
      });
    }

    // --- SEQUENCER LOGIC ---
    function nextNote() {
      const time = audioCtx.currentTime + 0.05;
      if (pattern.kick[currentStep]) playKick(time);
      if (pattern.tom[currentStep]) playTom(time);
      if (pattern.snare[currentStep]) playSnare(time);
      if (pattern.clap[currentStep]) playClap(time);
      if (pattern.closed_hat[currentStep]) playClosedHat(time);
      if (pattern.open_hat[currentStep]) playOpenHat(time);
      
      document.querySelectorAll('.pad').forEach(p => p.classList.remove('playing'));
      instruments.forEach(inst => {
        document.getElementById(`pad-${inst}-${currentStep}`).classList.add('playing');
      });

      currentStep = (currentStep + 1) % 16;
    }

    function scheduler() {
      nextNote();
      const secondsPerBeat = 60.0 / bpm;
      timerID = setTimeout(scheduler, (secondsPerBeat / 4) * 1000); 
    }

    function togglePlay() {
      initAudio();
      const btn = document.getElementById('playBtn');
      if (isPlaying) {
        clearTimeout(timerID);
        btn.innerText = 'Play'; btn.classList.remove('stop');
        document.querySelectorAll('.pad').forEach(p => p.classList.remove('playing'));
      } else {
        currentStep = 0;
        scheduler();
        btn.innerText = 'Stop'; btn.classList.add('stop');
      }
      isPlaying = !isPlaying;
    }

    function updateBPM(val) {
      bpm = val;
      document.getElementById('screen').innerText = `BPM: ${bpm} | GENRE: AI CUSTOM`;
    }

    // --- DATA LOADING ---
    const params = new URLSearchParams(window.location.search);
    try {
      if (params.has('data')) {
        const parsed = JSON.parse(decodeURIComponent(params.get('data')));
        instruments.forEach(inst => {
          if (parsed[inst]) pattern[inst] = parsed[inst];
        });
        if (parsed.bpm !== undefined) {
          let newBpm = parseFloat(parsed.bpm);
          if (!isNaN(newBpm)) {
            bpm = Math.max(60, Math.min(180, newBpm));
            document.getElementById('bpmSlider').value = bpm;
          }
        }
        document.getElementById('screen').innerText = `BPM: ${bpm} | GENRE: ${parsed.genre || 'AI'}`;
        updateGridVisuals();
      }
    } catch (e) { console.error("Parse error", e); }

  </script>
</body>
</html>
